name: Wheels

on:
  push:
    tags:
      - "*"
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read # to fetch code
  actions: write # to cancel previous workflows

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: Build wheel on ${{ matrix.os }} (Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ["ubuntu-latest", "ubuntu-24.04-arm", "macos-14"]
        python: ["cp311", "cp312", "cp313", "cp313t", "cp314", "cp314t"]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0
      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3.1
        env:
          CIBW_BUILD: "${{ matrix.python }}-*"
      - uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.os }}-${{ matrix.python }}
          path: ./wheelhouse/*.whl

  build_sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
      - name: Build sdist
        run: uv build --sdist
      - name: Check the sdist
        run: uvx twine check dist/*.tar.gz
      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz

  upload_pypi:
    environment:
      name: pypi
      url: https://pypi.org/p/jax-finufft
    permissions:
      id-token: write
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: dist
      - uses: pypa/gh-action-pypi-publish@v1.13.0
